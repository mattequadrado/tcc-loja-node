<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <span class="logotipo">Amor Doce</span>
    <nav class="nav-p">
      <ul class="nav-links">
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </nav>
    <nav class="nav-s">
      <ul class="nav-links">
        <li id="user-area">
          <a href="login.html" class="icon"><i class="bi bi-person"></i></a>
        </li>
      </ul>
    </nav>
  </header>

  <div class="admin-container">
    <h1>Painel Administrativo</h1>

    <div class="admin-tabs">
      <button class="tab-btn active" onclick="mostrarAba('dashboard', this)">
        <i class="bi bi-speedometer2"></i> Dashboard
      </button>
      <button class="tab-btn" onclick="mostrarAba('pedidos', this)">
        <i class="bi bi-receipt"></i> Pedidos
      </button>
      <button class="tab-btn" onclick="mostrarAba('produtos', this)">
        <i class="bi bi-box-seam"></i> Produtos
      </button>
    </div>

    <!-- Aba Dashboard -->
    <div id="aba-dashboard" class="aba">
      <div class="dashboard-grid">
        <div class="dash-card">
          <i class="bi bi-receipt"></i>
          <div>
            <span class="dash-label">Total de Pedidos</span>
            <span class="dash-valor" id="dash-total-pedidos">—</span>
          </div>
        </div>
        <div class="dash-card">
          <i class="bi bi-cash-stack"></i>
          <div>
            <span class="dash-label">Faturamento Total</span>
            <span class="dash-valor" id="dash-faturamento">—</span>
          </div>
        </div>
        <div class="dash-card dash-pendente">
          <i class="bi bi-clock"></i>
          <div>
            <span class="dash-label">Pendentes</span>
            <span class="dash-valor" id="dash-pendentes">—</span>
          </div>
        </div>
        <div class="dash-card dash-confirmado">
          <i class="bi bi-check-circle"></i>
          <div>
            <span class="dash-label">Confirmados</span>
            <span class="dash-valor" id="dash-confirmados">—</span>
          </div>
        </div>
        <div class="dash-card dash-entregue">
          <i class="bi bi-bag-check"></i>
          <div>
            <span class="dash-label">Entregues</span>
            <span class="dash-valor" id="dash-entregues">—</span>
          </div>
        </div>
      </div>

      <div class="estoque-baixo">
        <h2><i class="bi bi-exclamation-triangle"></i> Estoque Baixo</h2>
        <div id="lista-estoque-baixo"></div>
      </div>
    </div>

    <!-- Aba Pedidos -->
    <div id="aba-pedidos" class="aba" style="display:none;">
      <div class="sub-tabs">
        <button class="sub-tab-btn active" onclick="filtrarPedidos('pendente', this)">
          <i class="bi bi-clock"></i> Pendentes
        </button>
        <button class="sub-tab-btn" onclick="filtrarPedidos('confirmado', this)">
          <i class="bi bi-check-circle"></i> Confirmados
        </button>
        <button class="sub-tab-btn" onclick="filtrarPedidos('entregue', this)">
          <i class="bi bi-bag-check"></i> Entregue
        </button>
      </div>
      <div id="lista-pedidos"></div>
    </div>

    <!-- Aba Produtos -->
    <div id="aba-produtos" class="aba" style="display:none;">
      <div class="produto-form">
        <h2>Novo Produto</h2>
        <div class="input-group">
          <label>Nome</label>
          <input type="text" id="prod-nome" placeholder="Nome do produto">
        </div>
        <div class="input-group">
          <label>Descrição</label>
          <input type="text" id="prod-descricao" placeholder="Descrição">
        </div>
        <div class="input-group">
          <label>Preço</label>
          <input type="number" id="prod-preco" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="input-group">
          <label>Estoque</label>
          <input type="number" id="prod-estoque" placeholder="0" min="0">
        </div>
        <div class="form-acoes">
          <button onclick="criarProduto()" class="btn-salvar">
            <i class="bi bi-plus-lg"></i> Criar Produto
          </button>
        </div>
      </div>

      <div id="modal-editar" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; justify-content:center; align-items:center;">
        <div style="background:#fff; padding:30px; border-radius:12px; width:400px;">
          <h2 style="margin-bottom:20px;">Editar Produto</h2>
          <input type="hidden" id="edit-id">
          <div class="input-group">
            <label>Nome</label>
            <input type="text" id="edit-nome">
          </div>
          <div class="input-group">
            <label>Descrição</label>
            <input type="text" id="edit-descricao">
          </div>
          <div class="input-group">
            <label>Preço</label>
            <input type="number" id="edit-preco" step="0.01" min="0">
          </div>
          <div class="input-group">
            <label>Estoque</label>
            <input type="number" id="edit-estoque" min="0">
          </div>
          <div class="form-acoes">
            <button onclick="salvarEdicao()" class="btn-salvar">
              <i class="bi bi-check-lg"></i> Salvar
            </button>
            <button onclick="fecharModal()" class="btn-cancelar">
              <i class="bi bi-x-lg"></i> Cancelar
            </button>
          </div>
        </div>
      </div>

      <div id="lista-produtos-admin"></div>
    </div>
  </div>
<script src="api.js"></script>
  <script src="admin.js"></script>
  <script src="auth.js"></script>
</body>
</html>
